name: Publish GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare versioned Pages artifact
        run: |
          cp -R docs _site
          printf 'window.GROCERY_LEDGER_BUILD = "%s";\n' "$GITHUB_SHA" > _site/version.js
          printf '{"build":"%s"}\n' "$GITHUB_SHA" > _site/version.json
          sed -i "s|src=\"version.js\"|src=\"version.js?v=${GITHUB_SHA}\"|" _site/index.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
