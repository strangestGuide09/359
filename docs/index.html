<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="A private, shared household ledger for reviewed expenses and restock cues.">
    <meta property="og:title" content="Grocery Ledger">
    <meta property="og:description" content="Shared bills. Smarter restocks.">
    <meta property="og:image" content="og.png">
    <title>Grocery Ledger — Shared bills, smarter restocks</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="signin.css">
  </head>
  <body>
    <main>
      <header><a class="brand" href="./"><b>GL</b> Grocery Ledger</a><span id="sync-state">Loading…</span></header>
      <div id="screen" aria-live="polite"></div>
      <p id="status" role="status" aria-live="polite"></p>
      <footer>Reviewed shared-ledger entries only · PDFs are processed locally · no payment method, address, card, or UPI details</footer>
    </main>

    <dialog id="entry"><form method="dialog"><div class="heading"><div><p>NEW ENTRY</p><h2 id="dialog-title">Add expense</h2></div><button id="close" type="button" aria-label="Close">×</button></div><div id="expense-fields"><label>What was bought?<input id="label" placeholder="e.g. Milk, Wi-Fi bill" required></label><div class="two"><label>Category<select id="category"><option>Groceries</option><option>Food</option><option>Wi-Fi</option><option>Water</option><option>Household</option><option>Other</option></select></label><label>Paid by<input value="You" disabled></label></div><label class="check"><input id="tracked" type="checkbox"> Track this for restock</label><label id="useby-label" class="hide">Optional estimated use-by<input id="useby" type="date"></label><label class="check"><input id="personal" type="checkbox"> Personal item — exclude from split</label></div><div id="settlement-fields" class="hide"><p>You are recording a payment you made to another household member.</p><p>No payment reference, payment mode, or bank detail is collected.</p></div><div class="two"><label>Amount (₹)<input id="amount" inputmode="decimal" placeholder="0.00" required></label><label>Date<input id="date" type="date" required></label></div><menu><button id="cancel" type="button" class="secondary">Cancel</button><button id="save" value="default">Save</button></menu></form></dialog>
    <input id="pdf-file" type="file" accept="application/pdf" hidden>
    <script type="module" src="app.js"></script>
  </body>
</html>
